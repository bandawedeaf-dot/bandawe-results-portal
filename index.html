<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bandawe Results Portal</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.min.js"></script> 
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }
.hidden { display:none; }
input, button { padding:10px; margin:5px; width:100%; }
table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #ccc; padding:8px; }
th { background:#003366; color:white; }
</style>
</head>

<body>

<h2>Bandawe School Results Portal</h2>

<!-- SEARCH -->
<div id="public">
<input id="name" placeholder="Full Name">
<input id="dob" placeholder="DOB dd/mm/yyyy">
<button onclick="search()">View Results</button>
<button onclick="showAdmin()">Admin</button>
</div>

<!-- RESULTS -->
<div id="results" class="hidden">
<h3 id="rname"></h3>
<p>Total: <span id="total"></span></p>
<p>Position: <span id="position"></span></p>
<table id="table"></table>
<button onclick="download()">Download PDF</button>
</div>

<!-- ADMIN -->
<div id="adminLogin" class="hidden">
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="hidden">
<button onclick="addStudent()">Add Student</button>
<button onclick="enterResults()">Enter Results</button>
<div id="adminArea"></div>
</div>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE

const firebaseConfig = {
  apiKey: "AlzaSyDUny1WaUaMeUgLLsUrFckhQAloCwDHX-c",
  authDomain: "bandawe-results-portal.firebaseapp.com",
  projectId: "bandawe-results-portal",
  storageBucket: "bandawe-results-portal.firebasestorage.app",
  messagingSenderId: "558408212445",
  appId: "1:558408212445:web:f93a5d74b74010ebdee034"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

alert("Firebase loaded successfully");

const subjects = ["Math","English","Science","Chichewa"];

// ================= ADMIN =================

function showAdmin(){
document.getElementById("public").classList.add("hidden");
document.getElementById("adminLogin").classList.remove("hidden");
}

function login(){

const username = document.getElementById("user").value;
const password = document.getElementById("pass").value;

if(username === "admin" && password === "1234"){

document.getElementById("adminLogin").classList.add("hidden");
document.getElementById("adminPanel").classList.remove("hidden");

} else {

alert("Wrong credentials");

}

}

function addStudent(){
document.getElementById("adminArea").innerHTML=
<input id="sname" placeholder="Name">
<input id="sdob" placeholder="DOB">
<button onclick="saveStudent()">Save</button>
`;
}

async function saveStudent(){

const sname = document.getElementById("sname").value.trim();
const sdob = document.getElementById("sdob").value.trim();

await db.collection("students").doc(sname).set({
dob: sdob
});

alert("Saved");

}

function enterResults(){
let inputs='';
subjects.forEach(s=>{
inputs+=`<label>${s}</label><input class="score" data-subject="${s}">`;
});

document.getElementById("adminArea").innerHTML=
<input id="rstudent" placeholder="Student Name">
${inputs}
<button onclick="saveResults()">Save Results</button>
`;
}

async function saveResults(){

const rstudent = document.getElementById("rstudent").value.trim();

let scores = {};
let total = 0;

document.querySelectorAll(".score").forEach(i => {

let val = parseInt(i.value) || 0;

scores[i.dataset.subject] = val;

total += val;

});

await db.collection("results").doc(rstudent).set({

scores: scores,
total: total

});

alert("Results saved");

}

// ================= SEARCH =================


async function search() {

try {

const inputName = document.getElementById("name").value.trim().toLowerCase();
const inputDob = document.getElementById("dob").value.trim();

const snapshot = await db.collection("students").get();

let found = null;

for (const doc of snapshot.docs) {

const dbName = doc.id.trim().toLowerCase();
const dbDob = doc.data().dob.trim();

if (dbName === inputName && dbDob === inputDob) {
found = doc.id;
break;
}

}

if (!found) {
alert("Student not found");
return;
}

const result = await db.collection("results").doc(found).get();

if (!result.exists) {
alert("Results not found");
return;
}

document.getElementById("public").classList.add("hidden");
document.getElementById("results").classList.remove("hidden");

await loadResults(found, result.data());

} catch (e) {

alert("ERROR: " + e.message);
console.error(e);

}

}

async function loadResults(name,data){

document.getElementById("rname").innerText=name;
document.getElementById("total").innerText=data.total;

// calculate position
let snapshot = await db.collection("results").get();
let arr=[];

snapshot.forEach(doc=>{
arr.push({name:doc.id,total:doc.data().total});
});

arr.sort((a,b)=>b.total-a.total);

let pos = arr.findIndex(s=>s.name===name)+1;
document.getElementById("position").innerText = pos;

let html="<tr><th>Subject</th><th>Score</th></tr>";

for(let s in data.scores){
html+=`<tr><td>${s}</td><td>${data.scores[s]}</td></tr>`;
}

document.getElementById("table").innerHTML = html;
}

// ================= PDF =================

function download(){
window.print();
}

</script>

</body>
</html>
