<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bandawe Results Portal</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUny1WaUaMeUgLLsUrFckhQAloCwDHX-c",
            authDomain: "bandawe-results-portal.firebaseapp.com",
            projectId: "bandawe-results-portal",
            storageBucket: "bandawe-results-portal.firebasestorage.app",
            messagingSenderId: "558408212445",
            appId: "1:558408212445:web:f93a5d74b74010ebdee034"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const subjects = ["Math", "English", "Science", "Chichewa"];

        window.db = db;

        // ================= ADMIN =================
        window.showAdmin = function() {
            document.getElementById("public").classList.add("hidden");
            document.getElementById("adminLogin").classList.remove("hidden");
        };

        window.login = function() {
            const username = document.getElementById("user").value.trim();
            const password = document.getElementById("pass").value.trim();
            if (username === "admin" && password === "1234") {
                document.getElementById("adminLogin").classList.add("hidden");
                document.getElementById("adminPanel").classList.remove("hidden");
            } else {
                alert("Incorrect credentials!");
            }
        };

        window.addStudent = function() {
            document.getElementById("adminArea").innerHTML = `
                <h3>Add New Student</h3>
                <input id="sname" placeholder="Full Name">
                <input id="sdob" placeholder="DOB dd/mm/yyyy">
                <button onclick="saveStudent()">Save Student</button>
            `;
        };

        window.saveStudent = async function() {
            const sname = document.getElementById("sname").value.trim();
            const sdob = document.getElementById("sdob").value.trim();
            if (!sname || !sdob) return alert("Fill all fields");

            try {
                await setDoc(doc(db, "students", sname), { dob: sdob });
                alert("Student saved successfully!");
                document.getElementById("sname").value = "";
                document.getElementById("sdob").value = "";
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        window.enterResults = function() {
            let html = `<h3>Enter Results for Student</h3><input id="rstudent" placeholder="Student Name">`;
            subjects.forEach(sub => {
                html += `
                    <div style="margin:10px 0">
                        <label><strong>${sub}:</strong></label><br>
                        <input class="score" data-subject="${sub}" type="number" min="0" max="100" style="width:100%">
                    </div>`;
            });
            html += `<button onclick="saveResults()">Save Results</button>`;
            document.getElementById("adminArea").innerHTML = html;
        };

        window.saveResults = async function() {
            const rstudent = document.getElementById("rstudent").value.trim();
            if (!rstudent) return alert("Enter student name");

            let scores = {}, total = 0;
            document.querySelectorAll(".score").forEach(i => {
                const val = parseInt(i.value) || 0;
                scores[i.dataset.subject] = val;
                total += val;
            });

            try {
                await setDoc(doc(db, "results", rstudent), { scores, total });
                alert("Results saved successfully!");
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        // ================= SEARCH & RESULTS =================
        window.search = async function() {
            try {
                const inputName = document.getElementById("name").value.trim();
                const inputDob = document.getElementById("dob").value.trim();
                if (!inputName || !inputDob) return alert("Enter name and DOB");

                const snapshot = await getDocs(collection(db, "students"));
                let found = null;

                snapshot.forEach(docSnap => {
                    if (docSnap.id.trim().toLowerCase() === inputName.toLowerCase() && 
                        docSnap.data().dob.trim() === inputDob) {
                        found = docSnap.id;
                    }
                });

                if (!found) return alert("Student not found");

                const resultSnap = await getDoc(doc(db, "results", found));
                if (!resultSnap.exists()) return alert("Results not entered yet");

                document.getElementById("public").classList.add("hidden");
                document.getElementById("results").classList.remove("hidden");
                loadResults(found, resultSnap.data());
            } catch (e) {
                console.error(e);
                alert("Error: " + e.message);
            }
        };

        function loadResults(name, data) {
            document.getElementById("rname").innerText = name;
            document.getElementById("total").innerText = data.total || 0;

            // Position calculation
            getDocs(collection(db, "results")).then(snapshot => {
                let arr = [];
                snapshot.forEach(docSnap => {
                    arr.push({ name: docSnap.id, total: docSnap.data().total || 0 });
                });

                arr.sort((a, b) => b.total - a.total);
                const pos = arr.findIndex(s => s.name === name) + 1;
                document.getElementById("position").innerText = `${pos} out of ${arr.length}`;
            });

            // Build Results Table - FIXED
            let tableHtml = `
                <tr>
                    <th>Subject</th>
                    <th>Score</th>
                </tr>
            `;

            // Use the original subjects array to ensure correct order and display
            subjects.forEach(sub => {
                const score = data.scores && data.scores[sub] !== undefined ? data.scores[sub] : 0;
                tableHtml += `
                    <tr>
                        <td><strong>${sub}</strong></td>
                        <td>${score}</td>
                    </tr>
                `;
            });

            document.getElementById("table").innerHTML = tableHtml;
        }

        window.download = function() { window.print(); };

        window.backToSearch = function() {
            document.getElementById("results").classList.add("hidden");
            document.getElementById("adminPanel").classList.add("hidden");
            document.getElementById("adminLogin").classList.add("hidden");
            document.getElementById("public").classList.remove("hidden");
            document.getElementById("adminArea").innerHTML = "";
        };

        console.log("✅ Bandawe Results Portal Loaded Successfully");
    </script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; max-width: 900px; margin: 0 auto; }
        .hidden { display: none; }
        input, button { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; }
        button { background: #003366; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #002244; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        td, th { border: 1px solid #ccc; padding: 12px; text-align: left; }
        th { background: #003366; color: white; }
        label { font-weight: bold; }
    </style>
</head>
<body>

    <h2>Bandawe School Results Portal</h2>

    <div id="public">
        <input id="name" placeholder="Full Name">
        <input id="dob" placeholder="Date of Birth (dd/mm/yyyy)">
        <button onclick="search()">View Results</button>
        <button onclick="showAdmin()">Admin Login</button>
    </div>

    <div id="results" class="hidden">
        <h3 id="rname"></h3>
        <p><strong>Total Score:</strong> <span id="total"></span></p>
        <p><strong>Position:</strong> <span id="position"></span></p>
        <table id="table"></table>
        <button onclick="download()">Print Report</button>
        <button onclick="backToSearch()">Back</button>
    </div>

    <div id="adminLogin" class="hidden">
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="backToSearch()">Back</button>
    </div>

    <div id="adminPanel" class="hidden">
        <button onclick="addStudent()">Add Student</button>
        <button onclick="enterResults()">Enter Results</button>
        <button onclick="backToSearch()">Logout</button>
        <div id="adminArea" style="margin-top:20px;"></div>
    </div>

</body>
</html>
