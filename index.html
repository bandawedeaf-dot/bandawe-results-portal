<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandawe School Results Portal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
header { background:#003366; color:white; text-align:center; padding:15px; }
.container { max-width:900px; margin:15px auto; background:white; padding:20px; border-radius:10px; }

input, select { width:100%; padding:10px; margin:8px 0; }
button { padding:10px; margin:5px; cursor:pointer; }

.hidden { display:none; }

table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:8px; }
th { background:#003366; color:white; }
</style>
</head>

<body>

<header>
<h2>BANDAWE SCHOOL FOR THE DEAF</h2>
</header>

<div class="container">

<!-- SEARCH -->
<div id="publicSection">
<h3>Check Results</h3>
<input id="fullName" placeholder="Full Name">
<input id="dob" placeholder="DOB dd/mm/yyyy">
<button onclick="searchStudent()">VIEW RESULTS</button>
<button onclick="showAdmin()">Admin Login</button>
</div>

<!-- RESULTS -->
<div id="resultsSection" class="hidden">
<button onclick="goBack()">Back</button>
<h3 id="studentName"></h3>
<p>Total: <span id="total"></span></p>
<p>Position: <span id="position"></span></p>
<p>Remarks: <span id="remarks"></span></p>

<table id="table"></table>

<button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="hidden">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password" type="password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden">
<button onclick="addStudent()">Add Student</button>
<button onclick="enterResults()">Enter Results</button>
<div id="adminContent"></div>
</div>

</div>

<script>

const subjects = ["Math","English","Science","Chichewa"];

let students = JSON.parse(localStorage.getItem("students")) || {};
let resultsDB = JSON.parse(localStorage.getItem("resultsDB")) || {};

function saveData(){
localStorage.setItem("students", JSON.stringify(students));
localStorage.setItem("resultsDB", JSON.stringify(resultsDB));
}

function showAdmin(){
document.getElementById("publicSection").classList.add("hidden");
document.getElementById("adminLogin").classList.remove("hidden");
}

function login(){
if(user.value==="admin" && pass.value==="1234"){
adminLogin.classList.add("hidden");
adminPanel.classList.remove("hidden");
}else{
alert("Wrong login");
}
}

function addStudent(){
adminContent.innerHTML=`
<input id="name" placeholder="Name">
<input id="dob2" placeholder="DOB">
<select id="cls">
<option>Standard 7</option>
<option>Standard 8</option>
</select>
<button onclick="saveStudent()">Save</button>
`;
}

function saveStudent(){
students[name.value]={dob:dob2.value, class:cls.value};
saveData();
alert("Saved");
}

function enterResults(){
let inputs='';
subjects.forEach(s=>{
inputs+=`<label>${s}</label><input class="score" data-subject="${s}">`;
});

adminContent.innerHTML=`
<input id="rname" placeholder="Student Name">
${inputs}
<button onclick="saveResults()">Save Results</button>
`;
}

function saveResults(){
let name=rname.value;
let total=0;
let scores={};

document.querySelectorAll(".score").forEach(i=>{
let s=i.dataset.subject;
let val=parseInt(i.value)||0;
scores[s]=val;
total+=val;
});

resultsDB[name]={scores,total};
saveData();
alert("Saved");
}

function getPosition(name){
let arr=Object.entries(resultsDB).map(([n,v])=>({n,total:v.total}));
arr.sort((a,b)=>b.total-a.total);
return arr.findIndex(s=>s.n===name)+1;
}

function searchStudent(){
let name=fullName.value;
let dobVal=dob.value;

if(!students[name] || students[name].dob!==dobVal){
alert("Not found");
return;
}

publicSection.classList.add("hidden");
resultsSection.classList.remove("hidden");

loadResults(name);
}

function loadResults(name){
let data=resultsDB[name];

studentName.innerText=name;
total.innerText=data.total;
position.innerText=getPosition(name);

let html="<tr><th>Subject</th><th>Score</th></tr>";

for(let s in data.scores){
html+=`<tr><td>${s}</td><td>${data.scores[s]}</td></tr>`;
}

table.innerHTML=html;
remarks.innerText="Good";
}

function goBack(){
resultsSection.classList.add("hidden");
publicSection.classList.remove("hidden");
}

function downloadPDF(){
html2pdf().from(resultsSection).save();
}

</script>

</body>
</html>
