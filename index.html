<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bandawe School Results Portal</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUny1WaUaMeUgLLsUrFckhQAloCwDHX-c",
            authDomain: "bandawe-results-portal.firebaseapp.com",
            projectId: "bandawe-results-portal",
            storageBucket: "bandawe-results-portal.firebasestorage.app",
            messagingSenderId: "558408212445",
            appId: "1:558408212445:web:f93a5d74b74010ebdee034"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const subjects = [
            "Agriculture", "Bible Knowledge", "Chichewa", "English", 
            "Expressive Arts", "Mathematics", "Life Skills", 
            "Science & Tech", "Social Studies"
        ];

        const classes = [
            "Standard 1", "Standard 2", "Standard 3", "Standard 4",
            "Standard 5", "Standard 6", "Standard 7", "Standard 8"
        ];

        window.db = db;

        function getGradeAndRemark(score) {
            if (score >= 80) return { grade: 4, remark: "Excellent" };
            if (score >= 60) return { grade: 3, remark: "Good" };
            if (score >= 40) return { grade: 2, remark: "Average" };
            return { grade: 1, remark: "Need Support" };
        }

        function getOverallRemark(total, maxTotal) {
            const percentage = (total / maxTotal) * 100;
            if (percentage >= 80) return "Outstanding performance! Keep it up.";
            if (percentage >= 70) return "Very good work. Continue improving.";
            if (percentage >= 60) return "Good performance. Aim higher next term.";
            if (percentage >= 40) return "Satisfactory. More effort needed in weak areas.";
            return "Needs significant improvement. Extra support recommended.";
        }

        // ADMIN FUNCTIONS
        window.showAdmin = () => {
            document.getElementById("public").classList.add("hidden");
            document.getElementById("adminLogin").classList.remove("hidden");
        };

        window.login = () => {
            const user = document.getElementById("user").value.trim();
            const pass = document.getElementById("pass").value.trim();
            if (user === "admin" && pass === "1234") {
                document.getElementById("adminLogin").classList.add("hidden");
                document.getElementById("adminPanel").classList.remove("hidden");
            } else alert("Incorrect credentials!");
        };

        window.addStudent = () => {
            let opts = classes.map(c => `<option value="\( {c}"> \){c}</option>`).join('');
            document.getElementById("adminArea").innerHTML = `
                <h3>Add New Student</h3>
                <input id="sname" placeholder="Full Name">
                <select id="sclass"><option value="">—— Select Class ——</option>${opts}</select>
                <input id="sdob" placeholder="DOB dd/mm/yyyy">
                <button onclick="saveStudent()">Save Student</button>
            `;
        };

        window.saveStudent = async () => {
            const sname = document.getElementById("sname").value.trim();
            const sclass = document.getElementById("sclass").value;
            const sdob = document.getElementById("sdob").value.trim();
            if (!sname || !sclass || !sdob) return alert("All fields required!");
            await setDoc(doc(db, "students", sname), {class: sclass, dob: sdob});
            alert("Student saved!");
        };

        window.enterResults = () => {
            let opts = classes.map(c => `<option value="\( {c}"> \){c}</option>`).join('');
            let html = `<h3>Enter Results</h3>
                <input id="rstudent" placeholder="Student Name">
                <select id="rclass"><option value="">—— Select Class ——</option>${opts}</select>
                <input id="classSize" type="number" placeholder="Number of Learners in Class" min="1">
                <select id="term"><option value="Term 3" selected>Term 3</option></select>
                <input id="year" type="number" value="2026">
            `;
            subjects.forEach(s => {
                html += `<div style="margin:12px 0"><label><strong>\( {s}:</strong></label><br><input class="score" data-subject=" \){s}" type="number" min="0" max="100"></div>`;
            });
            html += `<button onclick="saveResults()">Save Results</button>`;
            document.getElementById("adminArea").innerHTML = html;
        };

        window.saveResults = async () => {
            const rstudent = document.getElementById("rstudent").value.trim();
            const rclass = document.getElementById("rclass").value;
            const classSize = parseInt(document.getElementById("classSize").value);

            if (!rstudent || !rclass || !classSize) return alert("All fields required!");

            let scores = {}, total = 0;
            document.querySelectorAll(".score").forEach(inp => {
                let v = parseInt(inp.value) || 0;
                scores[inp.dataset.subject] = v;
                total += v;
            });

            await setDoc(doc(db, "results", rstudent), {
                scores, total, class: rclass, classSize, term: "Term 3", year: 2026
            });
            alert("Results saved!");
        };

        // SEARCH & DISPLAY
        window.search = async () => {
            try {
                const name = document.getElementById("name").value.trim();
                const dob = document.getElementById("dob").value.trim();
                if (!name || !dob) return alert("Enter name and DOB");

                const studentsSnap = await getDocs(collection(db, "students"));
                let studentId = null;
                studentsSnap.forEach(doc => {
                    if (doc.id.toLowerCase() === name.toLowerCase() && doc.data().dob === dob) {
                        studentId = doc.id;
                    }
                });

                if (!studentId) return alert("Student not found");

                const resultSnap = await getDoc(doc(db, "results", studentId));
                if (!resultSnap.exists()) return alert("Results not found for this student");

                document.getElementById("public").classList.add("hidden");
                document.getElementById("results").classList.remove("hidden");
                loadResults(studentId, resultSnap.data());
            } catch(e) {
                console.error(e);
                alert("Error loading results");
            }
        };

        async function loadResults(name, data) {
            console.log("Loading results for:", name, data); // Debug

            document.getElementById("rname").innerText = name;
            document.getElementById("total").innerText = data.total || 0;

            const maxTotal = subjects.length * 100;
            const percentage = Math.round((data.total / maxTotal) * 100);
            const passed = percentage >= 40;

            // Position
            let position = "N/A";
            try {
                const allSnap = await getDocs(collection(db, "results"));
                let list = [];
                allSnap.forEach(d => {
                    if (d.data().class === data.class) list.push({name: d.id, total: d.data().total || 0});
                });
                list.sort((a,b) => b.total - a.total);
                position = list.findIndex(item => item.name === name) + 1;
            } catch(e){}

            // Summary
            document.getElementById("summary").innerHTML = `
                <p><strong>Name of Learner:</strong> ${name}</p>
                <p><strong>Class:</strong> ${data.class || 'N/A'}</p>
                <p><strong>Marks Scored:</strong> ${data.total || 0} / 900</p>
                <p><strong>Position:</strong> ${position} out of ${data.classSize || 'N/A'}</p>
                <p><strong>Status:</strong> <span style="color:\( {passed?'green':'red'}"> \){passed ? "PASSED" : "FAILED"}</span></p>
            `;

            // Table
            let html = `<tr><th>Subject</th><th>Score</th><th>Grade</th><th>Remark</th></tr>`;
            subjects.forEach(sub => {
                const score = data.scores?.[sub] ?? 0;
                const g = getGradeAndRemark(score);
                html += `<tr><td><strong>\( {sub}</strong></td><td> \){score}</td><td>\( {g.grade}</td><td> \){g.remark}</td></tr>`;
            });
            document.getElementById("table").innerHTML = html;

            document.getElementById("remark").innerHTML = `<strong>Teacher's Remark:</strong> ${getOverallRemark(data.total, maxTotal)}`;
        }

        window.download = () => window.print();
        window.backToSearch = () => {
            document.getElementById("results").classList.add("hidden");
            document.getElementById("public").classList.remove("hidden");
        };
    </script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; max-width: 1000px; margin: 0 auto; }
        h2 { text-align: center; color: #003366; }
        .hidden { display: none; }
        input, select, button { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; font-size: 16px; }
        button { background: #003366; color: white; border: none; cursor: pointer; }
        button:hover { background: #002244; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        td, th { border: 1px solid #666; padding: 10px; text-align: left; }
        th { background: #003366; color: white; }
        #summary p { margin: 8px 0; }
        @media print {
            body { background: white; }
            button, #public, #adminPanel, #adminLogin { display: none; }
        }
    </style>
</head>
<body>

    <h2>Bandawe School Results Portal</h2>

    <div id="public">
        <input id="name" placeholder="Full Name">
        <input id="dob" placeholder="Date of Birth (dd/mm/yyyy)">
        <button onclick="search()">View Results</button>
        <button onclick="showAdmin()">Admin Login</button>
    </div>

    <div id="results" class="hidden">
        <div style="text-align:center; margin-bottom:20px;">
            <h2>Term 3 Report Card</h2>
            <h3 id="rname"></h3>
        </div>
        
        <div id="summary" style="background:#f0f0f0; padding:15px; border-radius:8px; margin-bottom:15px;"></div>
        
        <table id="table"></table>
        
        <p id="remark" style="margin:20px 0; padding:15px; background:#f9f9f9; border-left:5px solid #003366;"></p>
        
        <button onclick="download()">Download Report Card</button>
        <button onclick="backToSearch()">Back</button>
    </div>

    <!-- Admin Sections -->
    <div id="adminLogin" class="hidden">
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="backToSearch()">Back</button>
    </div>

    <div id="adminPanel" class="hidden">
        <button onclick="addStudent()">Add Student</button>
        <button onclick="enterResults()">Enter Results</button>
        <button onclick="backToSearch()">Logout</button>
        <div id="adminArea" style="margin-top:20px;"></div>
    </div>

</body>
    </html>
