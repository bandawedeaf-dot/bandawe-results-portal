<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bandawe School Results Portal</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUny1WaUaMeUgLLsUrFckhQAloCwDHX-c",
            authDomain: "bandawe-results-portal.firebaseapp.com",
            projectId: "bandawe-results-portal",
            storageBucket: "bandawe-results-portal.firebasestorage.app",
            messagingSenderId: "558408212445",
            appId: "1:558408212445:web:f93a5d74b74010ebdee034"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const subjects = [
            "Agriculture", "Bible Knowledge", "Chichewa", "English", 
            "Expressive Arts", "Mathematics", "Life Skills", 
            "Science & Tech", "Social Studies"
        ];

        const classes = [
            "Standard 1", "Standard 2", "Standard 3", "Standard 4",
            "Standard 5", "Standard 6", "Standard 7", "Standard 8"
        ];

        window.db = db;

        function getGradeAndRemark(score) {
            if (score >= 80) return { grade: 4, remark: "Excellent" };
            if (score >= 60) return { grade: 3, remark: "Good" };
            if (score >= 40) return { grade: 2, remark: "Average" };
            return { grade: 1, remark: "Need Support" };
        }

        function getOverallRemark(total, maxTotal) {
            const percentage = (total / maxTotal) * 100;
            if (percentage >= 80) return "Outstanding performance! Keep it up.";
            if (percentage >= 70) return "Very good work. Continue improving.";
            if (percentage >= 60) return "Good performance. Aim higher next term.";
            if (percentage >= 40) return "Satisfactory. More effort needed in weak areas.";
            return "Needs significant improvement. Extra support recommended.";
        }

        // ================= ADMIN =================
        window.showAdmin = function() {
            document.getElementById("public").classList.add("hidden");
            document.getElementById("adminLogin").classList.remove("hidden");
        };

        window.login = function() {
            if (document.getElementById("user").value.trim() === "admin" && 
                document.getElementById("pass").value.trim() === "1234") {
                document.getElementById("adminLogin").classList.add("hidden");
                document.getElementById("adminPanel").classList.remove("hidden");
            } else {
                alert("Incorrect credentials!");
            }
        };

        window.addStudent = function() {
            let classOptions = classes.map(cls => `<option value="\( {cls}"> \){cls}</option>`).join('');
            document.getElementById("adminArea").innerHTML = `
                <h3>Add New Student</h3>
                <input id="sname" placeholder="Full Name">
                <select id="sclass">
                    <option value="">—— Select Class ——</option>
                    ${classOptions}
                </select>
                <input id="sdob" placeholder="DOB dd/mm/yyyy">
                <button onclick="saveStudent()">Save Student</button>
            `;
        };

        window.saveStudent = async function() {
            const sname = document.getElementById("sname").value.trim();
            const sclass = document.getElementById("sclass").value;
            const sdob = document.getElementById("sdob").value.trim();
            if (!sname || !sclass || !sdob) return alert("All fields required!");

            await setDoc(doc(db, "students", sname), { class: sclass, dob: sdob });
            alert("Student saved!");
        };

        window.enterResults = function() {
            let classOptions = classes.map(cls => `<option value="\( {cls}"> \){cls}</option>`).join('');
            let html = `<h3>Enter Results</h3>
                        <input id="rstudent" placeholder="Student Name">
                        <select id="rclass">
                            <option value="">—— Select Class ——</option>
                            ${classOptions}
                        </select>
                        <input id="classSize" type="number" placeholder="Number of Learners in Class" min="1">`;

            subjects.forEach(sub => {
                html += `<div style="margin:12px 0"><label><strong>${sub}:</strong></label><br>
                         <input class="score" data-subject="${sub}" type="number" min="0" max="100"></div>`;
            });

            html += `<button onclick="saveResults()">Save Results</button>`;
            document.getElementById("adminArea").innerHTML = html;
        };

        window.saveResults = async function() {
            const rstudent = document.getElementById("rstudent").value.trim();
            const rclass = document.getElementById("rclass").value;
            const classSize = parseInt(document.getElementById("classSize").value);

            if (!rstudent || !rclass || !classSize) return alert("All fields required!");

            let scores = {}, total = 0;
            document.querySelectorAll(".score").forEach(i => {
                const val = parseInt(i.value) || 0;
                scores[i.dataset.subject] = val;
                total += val;
            });

            await setDoc(doc(db, "results", rstudent), { 
                scores, total, class: rclass, classSize 
            });
            alert("Results saved successfully!");
        };

        // ================= VIEW RESULTS =================
        window.search = async function() {
            const inputName = document.getElementById("name").value.trim();
            const inputDob = document.getElementById("dob").value.trim();
            if (!inputName || !inputDob) return alert("Enter Name and DOB");

            const snapshot = await getDocs(collection(db, "students"));
            let found = null;
            snapshot.forEach(doc => {
                if (doc.id.trim().toLowerCase() === inputName.toLowerCase() && 
                    doc.data().dob.trim() === inputDob) found = doc.id;
            });

            if (!found) return alert("Student not found");

            const result = await getDoc(doc(db, "results", found));
            if (!result.exists()) return alert("Results not entered yet");

            document.getElementById("public").classList.add("hidden");
            document.getElementById("results").classList.remove("hidden");
            loadResults(found, result.data());
        };

        function loadResults(name, data) {
            document.getElementById("rname").innerText = name;
            document.getElementById("total").innerText = data.total || 0;

            const maxTotal = subjects.length * 100;
            const percentage = (data.total / maxTotal) * 100;
            const passed = percentage >= 40;
            const statusText = passed ? "PASSED" : "FAILED";

            // Overall Grade
            const avg = Math.round(data.total / subjects.length);
            const overall = getGradeAndRemark(avg);
            document.getElementById("overallGrade").innerHTML = `<strong>Overall Grade: ${overall.grade}</strong>`;
            document.getElementById("resultStatus").innerHTML = `<strong>Result: <span style="color:\( {passed ? 'green' : 'red'}"> \){statusText}</span></strong>`;

            // Position
            const classSize = data.classSize || "N/A";
            document.getElementById("position").innerText = `${data.class || ''} - Position ${/* Will improve later */ '1'} out of ${classSize}`;

            // Table - FIXED
            let html = `<tr><th>Subject</th><th>Score</th><th>Grade</th><th>Remark</th></tr>`;
            subjects.forEach(sub => {
                const score = data.scores?.[sub] ?? 0;
                const gr = getGradeAndRemark(score);
                html += `<tr>
                    <td><strong>${sub}</strong></td>
                    <td>${score}</td>
                    <td>${gr.grade}</td>
                    <td>${gr.remark}</td>
                </tr>`;
            });
            document.getElementById("table").innerHTML = html;

            document.getElementById("remark").innerHTML = `<strong>Teacher's Remark:</strong> ${getOverallRemark(data.total, maxTotal)}`;
        }

        window.download = () => window.print();
        window.backToSearch = () => {
            document.getElementById("results").classList.add("hidden");
            document.getElementById("public").classList.remove("hidden");
        };
    </script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; max-width: 1000px; margin: 0 auto; }
        h2 { text-align: center; color: #003366; }
        .hidden { display: none; }
        input, select, button { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; }
        button { background: #003366; color: white; border: none; cursor: pointer; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        td, th { border: 1px solid #444; padding: 10px; }
        th { background: #003366; color: white; }
        .report-header { text-align: center; margin: 20px 0; }
        @media print {
            body { background: white; }
            button, #public, #adminPanel, #adminLogin { display: none !important; }
        }
    </style>
</head>
<body>

    <h2>Bandawe School Results Portal</h2>

    <div id="public">
        <input id="name" placeholder="Full Name">
        <input id="dob" placeholder="Date of Birth (dd/mm/yyyy)">
        <button onclick="search()">View Results</button>
        <button onclick="showAdmin()">Admin Login</button>
    </div>

    <div id="results" class="hidden">
        <div class="report-header">
            <h2>Term 3 Report Card</h2>
            <h3 id="rname"></h3>
        </div>
        
        <p><strong>Total Score:</strong> <span id="total"></span> / 900</p>
        <p id="overallGrade"></p>
        <p id="resultStatus"></p>
        <p><strong>Position:</strong> <span id="position"></span></p>
        
        <table id="table"></table>
        
        <p id="remark" style="margin:20px 0; padding:15px; background:#f9f9f9; border-left:5px solid #003366;"></p>
        
        <button onclick="download()">Download Report Card</button>
        <button onclick="backToSearch()">Back</button>
    </div>

    <!-- Admin sections remain the same -->
    <div id="adminLogin" class="hidden"> ... </div>
    <div id="adminPanel" class="hidden"> ... </div>

</body>
            </html>
